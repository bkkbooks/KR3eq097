body:
  text: 卷下金劉氏完素金史藝文志補素問玄機原病式二卷宣明論方十五卷素問要旨論八卷運氣要旨論一卷傷寒直格三卷傷寒直格方三卷傷寒後集一卷傷寒續集一卷傷寒別集一卷傷寒標本心法類萃二卷治病心印一卷十八劑一卷國朝四庫素問玄機原病式二卷宣明論方十五卷傷寒直格方三卷傷寒標本心法類萃二卷上書十六種去復四種凡十二種金河間劉完素撰完素字守真自號通元處士大揚醫道於大定明昌間所著原病式舉至真要大論二百七十七字為綱反復辯論至二萬餘言謂已深探奧妙宣明論方採內經六十一證分一十七門撰為主治之方其性矜伐工自譽尊仲聖為亞聖又以為未備聖人之道推朱肱為博辨又以為未知陰陽之理意欲度越古人蓋當時典籍散亡醫皆市儈完素一出士大夫咸翕然從風因開七百餘年偏執寒涼之弊余書文義淺率疑多偽託病機氣宜保命集系張元素撰謬誤始末詳元素下今通行河間六書末附都梁鎦洪傷寒心要一卷鎮陽常德傷寒心鏡一卷心鏡一名張子和別集案李濂醫史張從正草創儒門事親常仲明又摭其遺法為治法心要德疑即仲明之名書凡七篇首論河間雙解散及子和增減法心要凡十八方並病後四方敷衍河間之說多掇拾殘緒罕所發明金張氏元素金史藝文志病機氣宜保命集三卷醫學啟源二卷本草二卷國朝四庫病機氣宜保命集三卷民間行本家珍一卷上書五種去復一種凡四種金易州上谷張元素撰元素字潔古八歲應童子舉二十七試進士犯廟諱下第遂工醫保命集首列原道等總論十次病論二十三闡發深至病機一篇亦如原病式例用至真要大論為綱而援證精博文氣滂沛斷非守真所能楊威直為河間遺書偽序付梓明初寧王權重刻亦踵其誤李時珍本草綱目序例始糾其繆而復其真子壁號云岐子撰保命集二卷專論傷寒文頗簡潔蓋家學也注王氏脈訣一卷與保命集並傳金張氏從正金史藝文志儒門事親十五卷汗吐下法治病撮要一卷傷寒心鏡一卷秘錄奇方二卷經驗方三卷國朝四庫儒門事親十五卷上書六種去復一種凡五種金唯州考城張從正撰從政字子和號戴人宣宗興定中召補太醫末幾辭去學宗守真而規模侷促意旨粗率麻知幾常仲明與之友善其書蓋子和述而知幾仲明文飾之故儒門事親中辨記解誡箋詮式斷論疏述衍諸體皆具而以為儒者始明其理事親必當取資也然擅用寒涼汗吐下三法當時實多異議因有辨謗及高技常孤諸論明嘉靖辛丑邵輔以母年望六求是書與醫聞忠校序鋟版欲以垂暮之年試瞑眩之藥亦危矣哉金李氏杲元史藝文志脾胃論三卷蘭室秘藏六卷辨惑論二卷內外傷寒辨三卷醫學發明九卷傷寒會要未載卷用藥法象一卷國朝四庫脾胃論三卷蘭室秘藏六卷內外傷辨惑論三卷民間行本醫學發明一卷活法機要一卷上書十二種去復四種凡八種金真定李杲撰杲字明之自號東垣老人金亡入元年五十五又十七年乃卒大定初校籍富冠真定河間兩路納貲得官監濟源稅因母嬰疾為眾醫雜治死遂捐千金從張元素學醫許魯齋先生目為醫中王道明隆慶四年曹灼集元素父子及王好古李東垣田幼科書十種稱五人各以專學著述東垣獨能集其大戊故序刻成一家之言脾胃論三十六條有圖有論有方大抵原本內經實未能得內經精蘊蘭室秘藏二十一門十九論二百八十三方皆諄重脾胃極言寒涼攻伐之害為河間別樹一幟雖用藥繁重專尚香燥論固執而辭不達意亦當時救弊之砥柱也金羅氏天益明朝刻本衛生寶鑑二十四卷補遺一卷內經類編九卷東垣試效方九卷上書三種金真定羅天益撰天益字謙甫東垣傳付著作弟子是書一至三卷為藥誤永鑑四至二十卷為名方類集二十一卷為藥象類集二十二至二十四卷為醫驗紀述補遺為傷寒外感表裡陰陽三十一症治法大要修飾師說炫耀已長不免流俗之茸而信崇仲景論述內經殊為青出於藍然文義闒茸欲暢不能亦固已哉卷首有永樂十五年盧陵胡廣建安楊榮序元王氏好古元史藝文志醫壘元戎十二卷此事難知二卷湯液本草三卷湯液大法四卷陰症略例一卷癍論萃英一卷國朝四庫醫壘元戎十二卷此事難知二卷湯液本草四卷民間行本醫壘元戎一卷上書十種去復四種凡六種元趙州王好古撰好古字進之號海藏官本州教授提舉醫學受業潔古潔古歿遂師事東垣此事難知專論傷寒醫壘元戎兼述雜病其書推尊仲聖效法朱肱復斟酌二家變通其說雖於長沙大法無所闡明而寅畏小心實當時之翹楚醫壘元戎為明萬曆癸卯遼東巡撫顧遂刻而體例參差費校今本東垣十書竟刪成一卷湯液本草融會潔古珍珠囊東垣藥類法象用藥心法於本草原旨了無干涉元朱氏震亨元史藝文志金匱鉤玄三卷平治薈萃方三卷傷寒論辨疑一卷傷寒摘疑一卷格致餘論一卷局方發揮一卷治痘要法一卷活幼便覽二卷纂要八卷治法語錄三卷外科精要新論一卷本草衍義補遺一卷醫案一卷國朝四庫金匱鉤玄三卷格致餘論一卷局方發揮一卷民間行本心法五卷上書十七種去復三種凡十四種元婺州義烏朱震亨撰震亨字彥修學者尊為丹溪翁師許文正公衡究道德性命之學文正患末疾喻使習醫翁遂棄舉子業致力於陳裴二百九十七方漸悟其非乃遊歷他郡遇羅知悌知悌字子敬號太無先生宋理宗朝寺人初劉完素授醫學於荊山浮屠知悌悉受其傳又旁通子和明之二家翁盡得其秘歸起文正疾益推廣意旨因作相火及陽有餘陰不足之論專尚滋陰降火心法首論六篇分一百門金匱鉤玄分一百三十八類有方有論劉氏之學至翁益彰然絕去深沉專趨淺近執寒涼之結習滋流弊於三朝亦可謂功之首罪之魁矣戴良盛稱其敦孝友之行得道學之源重倫常而輕榮利為之作傳明休寧方廣字約之號古庵以醫遊河洛間寓陳留集丹溪心法附餘二十四卷龐雜不倫大失丹溪之旨尚有脈藥證治地理等書未見元趙氏以德民間刻本金匱衍義二十二卷上書一種元趙以德撰本書署曰宋人明程充序丹溪心法有丹溪門人劉叔淵戴元禮趙以德此書史志未戴元志有趙良金匱音義醫學宗旨華亭縣誌趙良字以德號云居浦江人張士誠據吳屢召不赴挈家隱華亭鄉間鬻醫自活元王氏履元史藝文志醫韻統一百卷百病鉤玄二十卷醫經溯洄集一卷國朝四庫醫經溯洄集一卷上書四種去復一種凡三種元崑山王履撰履字安道朱震亨弟子工詩善畫明洪武初始卒嘗謂素問人傷於寒則為病熱是論病之常仲景始分寒熱而義猶未盡又言陽明篇無目痛少陰篇無胸背痛太陰無隘乾厥陰篇無囊縮必有脫簡乃取三百九十七法中有方治者得二百三十八條為二百三十八治書凡二十一篇名醫經溯洄集辭雖誇伐於醫道實有發明足矯當時結習明祁門徐春甫云鉤玄醫統二書若存利濟民生匪淺因撰古今醫統一百卷既仍其名復仍其卷意春甫本有二書但改韻歸類增損而成己作耳春甫字東皋以醫受知太師成國公朱希忠官太醫名其術於公卿間故首有靈壁侯湯世隆等六人及嘉靖丙辰自序後列恭順侯吳繼爵臨淮侯李言恭平江伯陳王謨等三十八人銜名書分福壽康寧四集每集十冊以富貴榮華客清閒自在仙鵬程九萬里鶴算八千年玉質成飛步朱顏永駐延平安無量劫靜默有真源四十字為號廣引道藏經籙養生修煉及林靈素大成金書諸目一卷為歷代名醫二百七十二人小紀採摭書籍二百八十二部目錄二卷為內經要旨十一篇曰陰陽攝生病能論治脈候色診藏象經度運氣標本針刺三卷為翼醫通考四卷為內經脈侯五卷為運氣易覽六卷為經穴發明七卷為針灸直指八卷至七十九卷為病機治法凡一百四十二門八十八十一為外科理例八十二八十三為婦科心鏡八十四為螽斯廣育八十五為胎產須知八十六八十七為老老余編八十八至九十為幼幼類集九十一為豆疹泄秘九十二為奇病續抄一百三十七侯九十三為經驗秘方一百八十四道九十四九十五為本草集要九十六為本草御荒九十七為製法備錄九十八為通用諸方十類曰藥品花木天時人道飲食衣服起居器物鳥獸雜著九十九一百為養生余錄以神仙安期生名臣范蠡等五十二人亦為名醫經史子集註疏小說四十四種廁於醫籍甚至以僦貸季為岐伯之師少俞為俞拊之弟少師為桐君之爵太乙為雷公之號且名以宋時雷斆之斆陳藏器唐開元中人誤為梁人曰華子大明宋開寶中人誤為陳氏北齊雁門人白虎通壽命一篇毫不涉醫乃曰直抉醫家未宣之奧其紕繆自欺處不勝枚舉至病機雖祖述內經巢氏而治法不本漢唐惟著意於南宋以下諸子尤崇信當時胡濙易簡方蓋前明考據家陋習好奇務繁以誇博辨往往掛一漏萬根據無稽第體例甚井非萬病回春嵩崖尊生可比陳念祖欲一概廢之未免太過矣元呂氏復九靈山房集滄洲翁傳內經或問切脈樞要脈序脈系圖長沙傷寒十釋靈樞經脈箋運氣圖說難經附說五色診奇胲養生雜言四時燮理方松風齋雜著皆未載卷上書十一種元鄞人呂復撰復字元膺少孤事母至孝母病求醫遇衢醫鄭禮之得其古先禁方色脈藥論諸書遂精醫學薦為台州仙居縣儒學教諭後調臨海及升本郡教授俱不就因晦跡邱園著書自樂年老無子有女四人人比之為太倉公其書不傳戴良九靈山房集滄洲翁傳採其治效最著者二十三條為醫案並節其群經古方論考極為精審元滑氏壽明史藝文志十四經絡發揮三卷素問注鈔三卷難經本義二卷傷寒論鈔二卷診家樞要一卷醫家引彀一卷五臟補瀉心要一卷脈訣一卷醫韻一卷痔瘻篇一卷國朝四庫難經本義二卷上書十一種去復一種凡十種元餘姚滑壽撰壽字伯仁晚號攖寧生先世自襄徙儀真又徙餘姚師京口王居中受素問難經又師東平高潤陽學針法復參仲景完素東垣三家之旨年七十餘容如童子行步蹻捷飲酒無算其十四經絡發揮難經本義明薛己刻入集中素問注鈔等七種亡元倪氏維德明史藝文志原機啟微集二卷東垣試效方三卷上書二種元吳縣倪維德撰維德字仲賢祖父皆以醫顯病陳裴之學乃求金守真戴人東垣三家書研求意旨因得盛名殆私淑三家之矯矯者原機啟微專論目科薛己刪為一卷刻入集中東垣試效方亡明學士宋濂為撰墓銘稱為敕山老人洪武十年卒壽七十五子衡亦以醫名元齊氏德之元史藝文志外科精義二卷國朝四庫外科精義二卷上書一種元醫學博士充御藥院外科太醫齊德之撰籍里無考其書上卷論下卷方皆本巢氏病源千金要方千金翼方而參以所學雖不著出處鮮有發明於瘍醫書中實為善本民間行本刊入東垣十書內元危氏亦林國朝四庫世醫得效方二十卷上書一種元南豐危亦林撰亦林字達齋官本州醫學教授是書積其高祖以下五世所集醫方凡八種一大方脈科九十一門二小方脈科七十一門三風科十門四產科兼婦人雜病三十三門五目科十二門六口齒咽喉科六門七正骨金簇科二十九門八瘡腫科二十四門附孫真人養生法針灸科散附各科中有目無書序稱創始於天曆元年訖功於後至元三年凡一十六年由江西醫學提舉司牒呈醫院下諸路提舉司重校復白醫院始准刊行其慎重如此前有太醫院銜名凡院使十一人同知院事二人僉院事二人同僉院事二人判官二人經歷二人都事二人椽史二人其書彙集古方足資考據第無所發明禾於會稽梁氏見其元朝刻本惜未鈔錄元葛氏乾孫明史藝文志醫學啟蒙經絡十二論十卷十藥神書一卷上書二種元長洲葛乾孫撰乾孫字可久貌魁碩好擊刺陣法後折節讀書通陰陽律歷之學屢試不售父應雷字震父官江浙醫學提舉師中州李醫官始傳守真潔古之學於江南著醫學會同十二卷乾孫受父業名埒丹溪所傳十藥神書專尚奇詭絕無情義元馬氏宗素元史藝文志傷寒醫鑑一卷上書一種元平陽馬宗素撰宗素私淑守真是書凡一十一條皆摘活人書中溫藥主治之病不證以仲景原文但引素問論熱守真主寒之說極意攻排不遺餘力甚云下立死不下亦死宜用涼膈散涼膈散非下藥乎是以人命為孤注矣明吳有性著瘟疫論實本諸此夫傷寒論律也內經經也經主乎體律主乎用循經引律貴乎持平苟偏袒自專各爭門戶則經律相失體用相違未有不僨事者明徐氏用誠元史藝文志玉機微義五十卷本草發揮四卷明史藝文志劉純玉機微義五十卷國朝四庫玉機微義五十卷上書四種去復二種凡二種明會稽徐用誠撰咸寧劉純續增用誠字彥純丹溪弟子元亡入明遂為明人是書本名醫學折衷凡一十七類純以其未備增三十三類易以是名每條各注續添以為辨識皆採擷諸家方論附以案語頗為詳審嘉靖庚寅延平黃焯刻於永州楊士奇為序當時李氏之學多在中州劉氏之學獨傳江浙故朱氏一派專主寒涼補陰明戴氏原禮明史藝文志證治要訣十二卷校正金匱鉤玄三卷推求師意二卷證治類元未載卷證治用藥未載卷國朝四庫校正金匱鉤玄三卷推求師意二卷民間行本證治要訣十二卷證治類方四卷上書九種去復三種凡六種明婺州浦江戴原禮撰原禮字思恭丹溪弟子元亡入明遂為明人洪武中徵為御醫太祖不豫少間御右順門治侍疾無狀諸醫獨慰思恭為仁義人太孫嗣位罪諸醫復獨擢思恭為太醫院使永樂初以年老乞歸三年夏復徵入進見免拜是年冬乞骸骨遣官護送賚賜金帛逾月卒遺行人致祭年八十二校正丹溪金匱鉤玄附論六篇並推求師意皆保全其師補陰制火之說又隱括心法諸要撰證治要訣類方圓融委曲情法備至以救當時漫用寒涼之弊誠朱氏之功臣也明盛氏寅張氏醫通引書醫林廣義未載卷上書一種明吳江盛寅撰書亡俟考初吳邵王賓慕思恭技從之遊思恭欲其執弟子禮賓辭以老伺思恭出竊書以去將死無子以書授寅寅字啟東永樂初為醫學正科坐累輸作天壽山監者奇之令主算值前療愈脹病中人薦治其主疾既愈待成祖西苑校射成祖愕其尚在因奏寅愈疾狀召診稱旨授御醫東宮妃張氏經水十月不至寅獨以為非娠妃聞甚信遂進破血劑東宮素惡寅因械以待俄血下病已賜紅仗導歸仁宗嗣位出為南京太醫院宜宗立召還正統六年卒子孫皆世其業明陶氏華明史藝文志傷寒全書五卷傷寒六書六卷傷寒九種書九卷民間行本傷寒全生集葉桂評本四卷傷寒六書六卷上書五種明餘杭陶華撰華字節庵是書不述本論惟憑臆斷而文理荒謬意旨瑣絮雖間有精義名方實皆剽竊陳言攘為已作閱其正統十年自序云年七十七子方弱冠又多疾病慮已歿後誤於庸醫致絕祖祀因編書貽教全生集分列傷寒溫病等辨治一百七十三條復撰六書摯其要領又恐不知珍重遂定家秘殺車槌一提金截江網等鄙俚之名耄荒溺愛亦可悲矣明王氏綸明史藝文志本草集要明醫雜著皆未載卷上書二種明慈溪王綸著綸字汝言號節齋舉進士正德中以右副都御史巡撫湖廣其明醫雜著薛己刻入集中坊間亦有行本多金元諸家膚淺之說明虞氏搏明史藝文志方脈發蒙八卷醫學正傳八卷四庫存目醫學正傳八卷上書二種明義烏虞搏撰搏字天民自號花溪恆德老人是書成於正德乙亥其學宗尚朱震亨參以仲聖孫思邈李杲並選方之精粹者次於丹溪要語之後又撰或問五十條以申明之禾家有殘帙二卷並於沈金鰲傷寒綱目讀其引略雖畦徑褊仄亦精簡可採明薛氏己國朝四庫薛氏醫案十六種七十八卷上書一集明吳縣薛己撰己字立齋初為瘍醫後方工於內科因聯絡金元四家法創立真陰真陽論推衍金匱腎氣丸為六味八味及增損一二味則別成一方自謂神明變化遂開張介賓趙養葵等固執滋填之弊案金匱要略用腎氣丸者五條一曰虛勞腰痛少腹拘急小便不利一曰短氣有微飲當從小便去之一曰男子消渴小便反多飲水一斗小便亦一斗一曰婦人轉胞不得溺附方曰腳氣上入少腹不仁是腎氣丸專為理腎氣利小便而設難經以兩腎之中為生氣之根濁氣凝冱則生氣格硋津液消亡故用附桂通陽必重用滋燥斂陰泄濁之藥為佐又恐滋斂味厚致妨胃氣用丸而不用湯地黃分兩特重者慮陰液隨濁溲並泄用以保全津液非藉之填補也己不明此理直以為補陰君藥昧者或從而武和或從而訕謗介葛廬亦難解紛矣自著書八種曰內科摘要女科撮要外科樞要癘瘍機要正體類要口齒類要保嬰金鏡錄凡一十六卷父鎧所著保嬰撮要二十卷辭旨譾劣非金元諸家之實力窮研者可比且多載治驗援引貴遊殊形醜謬其刪改舊本附以己說者七種曰倪維德原機啟微陳自明婦人良方錢乙小兒直訣王綸明醫雜著陳文仲小兒痘疹方杜本傷寒金鏡錄朱震亨外科精要凡四十二卷悉非原書之舊天啟中朱明重刻前有紀事一篇言夢己求刻此書甚為怪誕明李氏湯卿四庫存目心印紺珠經二卷上書一種明李湯卿撰湯卿提要亦不知何許人書為明嘉靖丁未嘉興府知府趙瀛校刻上卷曰原道統推運氣明形氣詳脈法下卷曰察病機理傷寒演治法辨藥性十八劑錢大昕補元史藝文志有羅知悌心印紺珠一卷朱撝字好謙心印紺珠二卷不知即系此書或別有二種容俟博考明王氏肯堂明史藝文志醫論四卷證治準繩一百二十卷鬱岡齋筆麈四卷第一卷凡四十頁論醫醫統正脈一百九十六卷國朝四庫證治準繩一百二十卷上書五種去復一種凡四種明金壇王肯堂撰肯堂字宇泰兵部主事諫阻武宗南巡子杖臬之孫右都御史贈太子少保諡恭簡樵之子舉萬曆十七年焦竑榜進士與松江董其昌同科選庶常授檢討倭寇朝鮮疏陳十議願假御史銜練兵海上疏疏留中遂引疾會京察罷黜歸而研醫以著述自樂復以薦補南京行人司副終福建參政其醫統正脈集書四十四種自素問靈樞難經脈經傷寒論金匱要略明理論活人書以下繼以守真終於陶華皆沿金元以來結習證治準繩六種首雜病證治八冊附以類方八冊次傷寒準繩八冊瘍醫準繩六冊幼科準繩九冊女科準繩五冊凡四十四冊皆一年而成二種雖採掇繁富而珠礫雜收茫無去取徒眩後人耳目蓋其成功甚速決非一人之手況罷黜未幾又復起用宦興方殷著輯宜其率略矣醫論筆麈泛述醫事頗精卓可觀明李氏時珍國朝四庫本草綱目五十二卷脈學一卷奇經考一卷上書三種明蘄水李時珍撰時珍字東壁官楚王府奉祠正子建中為四川蓬溪知縣神宗詔修國史子建元上遺表及書命刊行天下是書取諸家本草芟復補闕糾謬凡一十六部六十二類一千八百八十二種每藥以正名為綱釋名為目次以集解辨疑正誤氣味主治附方自云歷年三十採書三百餘家三易稿而成萬曆間為王世楨序刻雖蒐羅至富考據精詳而誇多鬥靡究與經方意旨未相融貫又集其父言聞四診發明糾脈訣之失為瀕湖脈學附以宋道士崔嘉彥四言詩復考證奇經八脈創為氣口九道之圖詳其診法好名之心亦良苦矣明孫氏一奎國朝四庫赤水玄珠三十卷醫旨緒餘二卷三吳治驗二卷新都治驗二卷宜興治驗二卷上書五種明休寧孫一奎撰一奎字東宿號生生子玄珠分七十門每門又各分類次詳論寒熱虛實表裡氣血受病之原古今病證名稱之混晰理入彀治法適中殆擷取金元精粹之義加以文飾而成者醫旨分配太極陰陽五行於人身藏府經絡又直以癲癇為二病皆自擅聰明憑虛結撰又精究用人補人採煉之法以治勞損邪說導淫乃書中大瑕子泰來明來輯其醫案多所誇詡大抵專揚醫名不窮醫理淆於世俗之結習也明張氏介賓國朝四庫類經三十二卷景岳全書六十四卷上書二種明山陰張介賓撰介賓字會卿號景岳元劉靜修集金李杲嘗命其徒羅天益所撰之內經類編曾三毀其稿又閱三年乃成今書不傳介賓殆仿其體類集素問靈樞三百九十條分為一十二門曰攝生陰陽藏象脈色經絡標本氣味論治病疾針刺運氣會通又增圖翼十一卷附翼四卷雖割裂古經而條理甚井注多發明全書首為傳忠錄次脈神章傷寒典雜證謨婦人規小兒則痘疹詮外科鈐本草正次新方次古方皆分八陣曰補和寒熱固因攻散又集婦人小兒痘疹外科諸方妄稱典謨殊為乖謬且持論偏執工於怒罵沿薛己真陰真陽之習斥劉朱寒涼制火之非雖救當時攻伐之弊實開後世膩補之愆且每門首列經文而論中不提一字甚為疏忽然酒色越度精血消亡溫養填補在所必需其書又未可偏廢明繆氏希雍明史藝文志本草經疏二十卷方藥宜忌考十卷本草單方十卷國朝四庫先醒齋廣筆記四卷本草經疏三十卷上書五種去復一種凡四種明常熟繆希雍撰希雍字仲醇天啟中王紹徽作點將錄以東林諸人分配水滸名希雍為神醫安道全本草單方亡廣筆記為長興丁元薦裒希雍所用方成帙雍又增入群方及本草常用之藥傷寒溫病時疫治法經疏以神農為主附以諸家主治藥味禁忌次序悉依大觀本草然論多紕繆當時名醫以為經疏出而本草亡亦詆之太過矣張介賓與希雍同時希雍擅用寒涼介賓擅用溫補希雍尚變化介賓守法度二人各立門逕其實各有得力處明盧氏之頤國朝四庫本草乘雅半偈十卷痎瘧論疏一卷民間傳本學古診則四卷上書三種明錢塘戶之頤撰之頤字子繇又字自觀父復字不遠號芷園蒲癡著芷園臆草五種又集醫種子四種一為醫經種子集本草經難經一為醫論種子集傷寒論金匱要略一為醫方種子集仲景方附薛己方杜本舌法一為醫案種子集扁鵲倉公傳附薛己醫案及嘉靖中撫州易大艮思蘭醫案十八首萬曆丙辰庚申自序天啟甲子張天鱗何白李流芳序嘗著本草綱目博議命子繇成之子繇因取本經藥二百三十二種別錄至綱目諸書一百四十三種每藥之下有核參衍斷四目辨論精博甄錄謹嚴為註釋藥性家之祖閱十八載始成稿亡兵燹追憶重修因名半偈痎瘧方雖不古論實簡當診則為晚年目瞽所述雖重複錯誤猶可見少時篤學之功摩索金匱九卷及傷寒金鏡抄醫難晰疑未傳明吳氏有性國朝四庫瘟疫論二卷補遺一卷上書一種明震澤吳有性撰有性字又可是書以四時沴氣蘊為瘟疫病類傷寒而迥異古未分別乃著此論謂邪自口鼻入伏膜原與傷寒邪從毫竅入者相反數百瘟疫中偶或有一傷寒言殊鹵莽滅裂蓋崇禎之世兵燹頻仍凶荒迭薦民生流離死亡載道其乖戾汙穢之氣蒸為瘟疫病源即屬凶殘治法不妨峻厲有性智不及此遂因當時治效輒著正名正誤諸篇誹議先賢流毒後世聖裔孔以立為之註釋亦讀書偏信之過耳明劉氏若金劉氏自刻本本草述三十二卷上書一種明潛江劉若金撰若金字云密天啟乙丑進士由縣令歷監司忤時罷歸正氣聞天下崇禎末膺薦復起以司寇驅馳閩海知事不可為即於學易之年束身引退自號蠡園逸叟隱居著書三十載康熙乙巳卒年八十是書集藥六百九十一種分水火土金石滷石山草芳草隰草毒草蔓草水草石草谷菜五果山果夷果味部蓏部水果香木灌木苞木蟲鱗介禽獸人三十部權藥物生成之時度五氣五味五色以明陰陽升降之理有似平空結撰然理暢義博實發農經陶錄之秘與盧氏父子互相補苴允為註釋藥性家之祖校之前人屬火屬水入心入腎之說大相逕庭此為康熙己卯其子字漣水者令淳安時刻本有遂安毛際可嘉興高佑釲竟陵吳驥序明方氏有執國朝四庫傷寒論條辨八卷本草鈔一卷或問一卷痙書一卷上書四種明歙縣方有執撰有執字中行以傷寒論為王氏改移成氏竄亂致後世目為不全之書或沿襲其誤大失仲聖著書之旨因竭二十餘年心力始得端緒考訂成編然傷寒論屢經兵燹王氏萃集之後又為高繼沖編輯必以為何人改移何人竄亂非質諸仲聖終系穿鑿惟成氏註釋未盡厥義頗藉發明所附本草鈔或問痙書皆有據之學是書刻於萬曆壬辰國朝鄭重光字在辛為方氏里人刪其支辭參以程喻二家並附己意名曰續注亦行於世明周氏子干民間行本慎齋三書三卷脈法一卷醫案五卷運氣化機三卷脈學正傳四卷續醫案十二卷胡慎柔五書一卷查了吾正陽篇一卷上書八種明寧國周子干撰子干字慎齋太平人學宗薛己而別開蹊徑多謬悠欺偽之說毗陵胡住思涇縣查了吾皆師事之住思弟子毗陵石震字瑞章註釋三書五書並脈學正傳運氣化機慎齋醫案俱未世梓世傳鈔本疑是石震偽託惟慎齋三書脈法解為國朝乾隆間武進陳嘉樹鏤版傳世明李氏中梓四庫存目刪補頤生微論四卷民間行本醫宗必讀十卷士材三書六卷上書四種明華亭李中梓撰中梓字士材其頤生微論已刊於萬曆戊午崇禎壬午又自為刪補成二十四篇皆論醫家大要又雜入道家修煉諸法復輯醫宗必讀十卷首一卷為雜論二卷為脈色三四卷為本草五卷為傷寒餘五卷為雜病三十二門崇禎丁丑自序有云醫書漢七家唐六十四家採一百九十七家而漢志醫經七家經方十有一家唐志明堂經脈三十四家醫術二百五十七家宋志醫書五百八部與其所引幾風馬牛不相及殆信筆欺人並未檢閱史志耳三書首論脈法為診家正眼二卷次論藥性為本草通玄二卷次論病四十五門為病機沙篆二卷國朝順治庚寅刻後旋即散失康熙丁未其門人長洲尤乘補刻附入壽世青編二卷首列勿藥須知服藥須知次為食鑑本草食物治病皆規模金元明諸子雖援引經義殊鮮發明脈法本草尤淺率無味青編則悉踵其師陋習專務養生殊為遇誕國朝張氏志聰民間行本素問集註九卷靈樞經集註九卷傷寒論集註六卷金匱要略集註三卷本草崇原三卷侶山堂類辨二卷上書六種錢塘張志聰撰志聰字隱菴盧之頤弟子自稱南陽後裔於內經仲祖書童而習之白首始獲其要乃晝思夜夢又積二十年方成是集其論素問陰陽應象六節藏象二篇乃五運六氣之綱天元紀五運行六微旨氣交變五常正六元正紀至真要七篇皆論運氣篇卷浩大當即仲聖陰陽大論王冰得之以補足舊缺者然四氣調神亦曰大論所述亦四時主客之氣何以不與大綱之列又謂靈樞八十一篇乃君臣問難之辭即仲景所引八十一難似甚有理然平脈所引經文乃不在靈樞而在越人八十一難竟未指出其傷寒論提挈六經三百八十一證霍亂易復等九十三症使理明條貫一掃諸家割裂之非自有卓識國朝喻氏昌國朝四庫尚論篇八卷醫門法律十二卷寓意草四卷民間行本尚論前篇二卷尚論後篇四卷醫門法律六卷寓意草一卷上書三種南昌喻昌撰昌字嘉言明崇禎中以選貢入都卒無所就往來靖安間後復寄寓常熟皆以醫名是書首為尚論大義一篇謂卒病傷寒論十六卷卒病論六卷已亡傷寒論系王氏以己意編集賴有三百九十七法一百一十三方之名目可以校正又駁正序例校定篇目推方氏改叔和之舊為有卓識殊不知方法之數定於林億傷寒卒病唐志本系一書僅有十卷王氏編後尚有高氏其叫囂拗執實緣不善讀書法律明治療之術定功罪之律專為庸醫誤人而作思患予防亦醫林之砥柱也所引宋人劉溫舒撰運氣論奧三卷見四庫全書總目提要明姑蘇人俞子容字約齋撰續醫說十卷懷慶河內人何柏齋名塘宏治壬戍進士官南京右付都御史撰醫學管見弟子秀水徐彬字忠可撰一百十三方發明未載卷金匱要略論注二十四卷康熙辛亥梓行沈明宗字目南與彬同時同里師海鹽石楷撰傷寒論注十卷金匱要略注二十四卷康熙壬申梓行二家書皆精爽可觀國朝程氏林四庫聖濟總錄纂要二十六卷上書二種休寧程林撰林字云來以聖濟總錄簡編殘缺購得三本互相補苴尚缺一百七十至一百七十七卷其友項睿補撰小兒方五卷因繁重難行乃撮取要旨節成二十六卷序疏門類悉仍其舊今震澤汪氏所梓已復程缺又失末後二卷惜未獲程書補全林與喻昌同時每摘傷寒疑義詰質尚論篇中有答問一十六條張璐醫通引書目錄載金匱直解未見傳本案金匱要略直解有康熙十二年癸丑一六七三刊本惜程氏未之見耳耿鑑庭補記國朝張氏璐四庫存目張氏醫通十六卷傷寒纘論二卷緒論二卷本經逢原四卷診宗三昧一卷民間行本千金方衍義三十卷千金傷寒舌鑑一卷子倬傷寒兼證析義一卷上書五種長洲張璐撰璐字路玉號石頑匯次古今方論為張氏醫通主治宗薛己張介賓門類次第依王肯堂又別擇三十六方為祖統隸三百九十四方附景岳八略改其因略為兼略並著傷寒纘緒二論纘論先列原文次附註釋及正方一百十三皆本喻昌緒論首載總論四十八篇次雜法五篇證治百篇雜方百四十九皆擷採陳言出以己語大要以簡易淺近為宗診宗三昧則論議風生無可多否譏脈經太素為溷雜毒於經語中展卷即有金屑入目譏紫虛丹溪攖寧士材等為刻舟求劍案圖索驥自詡己作為風中鳥跡水上月痕非智慧辨才不能測識書凡總論七篇脈解三十二篇口問十二篇逆順異脈婦人嬰兒四篇康熙己巳即墨郭琇為之序刻己酉仁廟南巡其子登以書進呈奉旨留覽己丑秀水朱彝尊作序千金方衍義因真人之書無人能讀恐致失傳故敷衍其義以期昭揭用心良苦然幽奇窔奧斷難強解豈反激逆從四字可概真非所能而自以為能矣惟仍隸三十卷藉見宋本舊目云一卷雜論二卷婦人求子至下乳三卷虛損至雜治四卷補益至月水不調五卷上下少小序例至雜病六卷上下竅目病至面藥七捲風毒至諸膏八卷雜風至風痹九卷傷寒例至發汗吐下後十卷傷寒雜治至診溪毒十一肝藏十二膽府十三心藏十四小腸府十五上下脾藏十六胃府十七肺藏十八大腸府十九腎藏二十膀胱府二十一三焦方二十二丁腫瘭疽二十三九漏至大風二十四解食毒至㿗病二十五卒死至火瘡二十六食治二十七養性二十八平脈二十九三十針灸其三十一門二百二十三類與九十三卷者同是書未經進呈故四庫存目不載登字誕先又字以柔補醫通中痘疹又擴充金鏡錄觀舌心法為圖一百二十各有總論名傷寒舌鑑次子倬字飛疇著傷寒兼證析義專論傷寒兼雜病凡一十七篇設為問答並補目科國朝陳氏士鐸四庫存目石室秘錄六卷民間行本傷寒辨證錄十四卷附脈法一卷辨症奇聞十二卷洞天奧旨八卷上書四種山陰陳士鐸撰士鐸字遠公別號朱華子居稱大雅堂其書議論奇特方法新異蕪湖顧世澄瘍醫大全無錫沈金鰲尊生書皆廣引其方論信服其新奇案士鐸自序稱康熙丁卯遇岐伯仲聖雷公元化稚川思邈等於京師親受其法岐伯自號中清殿下宏宣秘錄無上天真大帝真君仲聖自號廣蘊真人竟為士鐸撰序書體皆曰人有某病眾以為某故殊不知乃某故非某故也人用某方必不效且致死己用某人某法則死者復生然立方多有可取者聞尚有本草新編未見國朝戴氏天章存存書屋刻本廣瘟疫論四卷上書一種上元戴天章撰天章字麟郊學者稱北山先生長子瀚雍正癸卯一甲第二人孫翼官御史貤贈朝議大夫是書折衷吳氏增辨症八兼證五夾證十並原論凡一百一十三條末附藥方八十三首為歙人鄭某剽刻其孫祖啟出存存書屋原稿更正雖論議委婉不若有性之決裝究為偏見不可訓國朝魏氏荔彤民間行本素問註疏二十四卷靈樞註疏九卷傷寒論註疏八卷金匱要略注二十二卷上書四種柏鄉魏荔彤撰荔彤字念庭康熙間歷官京口監司與吳中王子接為友自言於帖括吏牘之暇即研求醫理積五十餘年撰成是編實士大夫攻醫之矯矯者國朝葉氏桂四庫存目臨症指南醫案十卷續一卷民間行本種福堂續醫案一卷溫熱論一卷葉康王三家醫案三卷內葉一卷葉薛繆三家醫案三卷內葉一卷本事方箋釋十二卷景岳全書發揮十二卷陶氏全生集評本四卷醫效秘傳四卷上書八種吳縣葉桂撰桂字天士號香岩顯醫名於康熙雍正間乾隆丙戍錫山華南田輯其晚年門人朱心傳吳厚存張亮揆等日記醫案分八十八門每門之末附以總論名曰臨症指南醫案其後張氏集其遺案合康作霖王子接為三家吳氏合薛雪繆遵義為三家皆仿華氏體例不載稱呼不誇效驗但冠姓與年歲掃盡諸家浮習其審病處方實詳慎簡潔不刻意於古而自饒古趣康王薛繆奚能武其後塵惟酬應太繁淺率諧俗之方居半集者失於校擇遂開近時浮薄之端至全生集本山陰劉大化所撰坊賈竄入偽序藉盛名以求速售耳醫效秘傳本事方箋釋景岳全書發揮類皆偽託提要稱桂生平無所著作信矣顧景文手錄溫熱論二十則治一時傳染之病異於吳有性之專尚攻擊及幼科痘證一門皆精簡可採國朝徐氏大椿四庫蘭臺軌範八卷神農本草經百種錄一卷傷寒類方二卷醫學源流論二卷難經經釋二卷醫貫砭二卷上書六種吳江徐大椿撰大椿字靈胎號洄溪雍正間以醫名自序難經經釋謂越人本內經以作難經則內經具在錯謬處當援而駁正其殊法異議必別有師承不得仍執內經議其可否案漢書藝文志扁鵲內經九卷外經十二卷與黃帝內經十八卷外經三十九卷並傳後漢時仲景所引呂博望所注二千年來絕無異議大椿既以難經為兩漢前書又不能指今之內經為漢之何經況呂注已亡無從稽考自當闕疑何得妄為強解本草經亦僅取百種而日用之藥置其大半反孳孳於方士所附輕身延年之說趙獻可醫貫執薛己真陰真陽持八味六味庸識本無足砭乃逐句逐字索垢求疵肆加辱詈醫學源流論抉發積弊可稱傑作而人參論則曰誤服溫補補住邪氣至死不出核諸傷寒金匱用人參三十二方附子二十三方乾薑三十六方仲聖絕無告戒何尋常治法猶恐誤用害人此等巨患竟不齒及傷寒類方削去病論專載醫方令人按病求方不必循經辨症尤非體例蓋椿天性恃才傲物每信筆欺人又評葉桂醫案大率類此惟蘭臺軌範尚覺平允國朝尤氏怡民間行本傷寒貫珠集八卷金匱心典三卷金匱翼八卷醫學讀書記二卷續一卷靜香樓醫案一卷上書五種長洲尤怡撰怡字在涇號拙吾工詩與顧秀野沈歸愚為友著北田吟稿乾隆間以醫名於世嘗病方喻程三家之書條分未當因分傷寒三陽治法為十一門三百九十四條方九十道三陰治法三門一百十七條方二十七道提綱挈領束繁歸整為貫珠集雖踵沿陋習播亂原文較之三家則醇多疵少其金匱心典尤精簡可宗又著金匱翼專療雜病分四十九門每門各別類次論治簡而有要惟每類之末必有新定之方意欲度越古人猶是金元故態讀書記雖無甚精詣亦可見其用心之勤苦矣國朝程氏郊倩民間行本傷寒後條辨十五卷醫經脈圖句測四卷藥方二卷上書三種休寧程郊倩撰郊倩字應旄因方有執傷寒條辨未窮隱奧覆蓋加推擴故條分愈眾論議愈新究於仲聖立論之旨了無干涉脈圖藥方俟考國朝黃氏元御四庫全書存目素問懸解十三卷靈樞懸解九卷難經懸解二卷傷寒懸解十五卷金匱懸解二十二卷傷寒說意十一卷長沙藥解四卷四聖懸樞四卷四聖心源十卷玉楸藥解四卷素靈微蘊四卷上書十一種昌邑黃元御撰元御字坤載以素問本病刺志刺法三篇舊本皆曰亡細為紬繹則本病之文誤入玉機真藏刺志誤入診要經終刺法誤入通評虛實未嘗亡也經絡論即皮部論之後半篇皮部屬十二正經經絡之正文因正其錯簡復八十一篇之舊又考靈樞難經之文亦多脫誤如標本誤名衛氣四時氣大半誤入邪氣藏府病形津液五別誤名五癃津液別經別前十三段為正經後十五段為別經且誤入經脈中悉比櫛其辭俾相聯屬復治傷寒論得脈法八十三章六經正病及誤治壞病三百六十八章外感類病並用法宜忌八十六章合五百三十七章及金匱要略內傷雜病四診九候諸法皆定其次第釋其隱奧更撰說意會通傷寒大旨藥解詳繹長沙二百八十八方一百六十種藥處方療病之原心源融貫四聖之書創治雜病之法懸樞推究歲氣所應為堵禦寒溫痘疹四疫之方又擷經文精義為胎化等解九篇病解一十七篇附以醫案別成玉楸藥解自述用藥微義咸自作序意並撰杝元一篇以示志嘗曰思邈真人千金方以下著作如林與岐伯立言仲景立法之旨竟無一線微通而庸醫效尤俗子遵守天下咸棄圭壁而寶碔砆最可痛苦流涕語甚激烈蓋其左目為庸醫誤治成盲致落仕籍因發憤窮醫故抑塞磊落之氣時形楮墨雖四聖心源增損古方不存舊目且有天魂地魄等名不免炫奇篾古然持論皆以扶陽配陰為宗一洗金元以來滋陰熄火之習自是特識其傷寒懸解雖割裂古書而條分縷析實能窺見先師堂奧道光中陽湖張琦序刻傷寒懸解長沙藥解素靈微蘊四聖心源於宛鄰叢書金匱懸解尚未付梓國朝柯氏琴民間行本傷寒論注四卷傷寒論翼二卷傷寒附翼二卷上書三種總名來蘇集慈谿柯琴撰琴字韻伯號似峰本儒者工詩好為古文辭嘗讀傷寒論病方氏條辨之妄定喻氏尚論之矜奇乃逐條逐句細加研勘摘出脫文衍文倒句冗句或刪或正皆條理疏暢論議明晰惟以何者為仲聖之言何者為王氏之筆並闢林成二家三百九十七法之謬及改訛補闕諸字仍蹈文人擅作聰明結習失註釋家大體至謂傷寒雜病異軌同轅六經本為百病立法不專擊傷寒實傳仲景數千年未火之薪厥功偉矣國朝沈氏金鰲芊綠草堂刻本尊生書七十二卷上書一種錫山沈金鰲撰金鰲字芊綠號再平屢試京兆不售遂專以醫鳴書凡七種首載脈象統類一卷諸脈主病詩一卷附明道士曹元白南北規中導引法十八則次雜病源流犀燭三十卷傷寒論綱目十八卷婦科玉尺六卷幼科釋迷六卷要分劑藥十卷自序統會群書研審意理積數十年而成是編卒後十數年其弟子奇豐額藩皖時為之序刻首為藏府門七十五候十卷次奇經八脈門附一候一卷六淫門二十八候六卷內傷外感門十二候四卷面部門八候三卷身形門三十五部候六卷附諸穴及癰疽圖皆冠以總論附以群方婦科採輯眾說分為九門其論求嗣備述擇鼎進火及用金鳳銜珠方並描摹情狀大能導淫案房中八家列於漢志班氏已論及迷者必生疾殞命千金方有房中補益之術後賢指為書中大疵況倉公為漢代神醫止生五女其師公乘陽慶年七十餘無子求嗣之說倡於褚澄今所傳書實宋人偽託明李濂作醫史亦言世傳種子術皆妄何過信如此又胎孕所由篇褚氏云並非千金所引不知所本何書幼科分二十四門冠以四言韻語便初學記誦亦甚有理序稱其師孫慶曾與葉桂同門頗精痘科因受業時未陳臨診今師已故雖素讀錢陳曾萬湯魏翟聶八家之書心明瞭而手目未能相應故缺而有待傷寒論以本文為綱諸家為目分太陽為六十七門陽明三十九門少陽十門太陰六門少陰二十三門厥陰十一門病後症五門序稱常讀傷寒百餘家又假稽氏所藏欽定古今圖書集成藝術部按次詳讀採擷英華擬成是編又言條例悉本柯琴禾案傷寒家播亂原文倡於方有執刪改字句始於柯琴二人皆獨抒心得別開畦徑不傍他人門戶琴更文思俊爽措語周詳其以方類論實能束棼歸整金鰲無琴之才識學琴之形似雖以症類論以目釋綱亦殊有理而改補原文幾至不可句讀採集諸家復美醜不齊不著書名任情竄抹每非原書之舊且疏忽失檢序云百家所引止四十二家徒為考據者所笑蓋其性尚矜誇胸無成轍雖獲睹秘書實未得書中旨趣然四十二家之內世罕行本者若韓祗和楊士瀛危亦林趙嗣真朱撝虞搏樓英吳綬閔芝慶婁全善黃仲理張兼善一十二家之書藉此遂窺其底蘊此外世所通行若朱肱龐安常蘇頌許叔微寇宗奭成無己劉完素張元素父子李杲王好古朱震亨王履戴原禮陶華張介賓繆希雍趙獻可王肯堂方中行李中梓喻昌徐彬柯琴魏荔彤程郊倩陳士鐸等本志已詳未詳者婁全善淅人撰醫學綱目見古今醫統明史藝文志醫學綱目四十卷樓英撰金鰲兩引之或別有據龔信字瑞之號西園江西金溪人撰古今醫鑑十六卷刻於萬曆乙丑有扶溝劉自強鄢陵劉巡及恆我齋自序是書首列脈訣病機藥性運氣次分中風等一百三十三門終藥膏通治救荒皆金元以後餘緒特以己見出之耳即如廣瘡天疱源流各異患害懸殊信乃扭合為一既諄戒切忌用水銀輕粉檢閱其方用水銀者五輕粉者七且有並用者其他謬誤可概見矣沈氏所引並非此書子廷賢字子才號雲林著雲林醫聖八卷神彀四卷萬病回春八卷壽世保元十卷汪昂國朝休寧人字訒庵撰素靈類纂三卷本草備要四卷醫方集解三卷湯頭歌訣一卷國朝陳氏念祖民間行本傷寒論淺注六卷長沙方歌括六卷金匱要略淺注三十卷公餘醫錄四種上書七種長樂陳念祖撰念祖字修園自序傷寒論引漢書藝文志云湯液經出於伊尹傷寒金匱方除崔氏腎氣丸候氏黑散外皆伊尹遺方考漢志並無此語念祖所見或非今本淺注貫串原文頗便童蒙誦習然牽強附會處正復不少其作令保陽時又集神農木草經三品藥百十八種附別錄藥四十七種為本草經讀二卷又約論醫精語為三字經二卷附以藥方一卷並陰陽藏府論經絡四診運氣歌一卷又編補重輕宣通泄滑澀濕燥寒熱十二劑方百八道為時方歌括二卷又採脈法及雜病三十六門並婦人傷寒為時方妙用二卷其立論主於排擊金元實不能越金元之圍範推崇漢唐亦不能得漢唐之綱領本草經解要四卷為梁溪姚球字頤真撰自序學醫始末著書原委門人王從龍跋從龍叔海文序又列參校門人華元龍等一十八人名為六安州守楊公子字遠齋者所刻稱尚有南陽經解幼科新書刪補慎齋遺書評點景岳全書類經諸稿未梓坊賈因書不售剜補桂名遂致吳中紙貴念祖未見原本故踵其訛誤如此候官蔣慶齡本草經讀序言念祖自述所著尚有傷寒論注四卷重訂柯注傷寒論八卷重訂活人百問八卷金匱淺注十六卷醫醫偶錄二卷醫學從眾錄八卷真方歌括二卷景岳新方砭四卷傷寒論讀四卷金匱讀四卷醫約二卷醫訣三卷本草經注六卷凡一十三種今惟金匱淺注傳世余皆未見國朝鄒氏澍家藏刻本本經疏證十二卷本經續疏六卷本草序疏要八卷家藏未刻稿讀醫經筆記三卷傷寒通解四卷長沙方疏證六卷上書六種武進鄒澍撰澍字潤安晚號閏庵悟先儒性命之旨不習舉業特致力於醫嘗用春秋屬辭比事法治素問傷寒論金匱要略於不合處求其義之所在又以劉潛江本草述雖意旨精博而不甚用力於漢唐因將仲聖所用藥百七十三味研究六年撰成本經疏證常用藥百四十二味成本經續疏猶以為未盡厥旨復取序例所列主療八十三類及徐氏續入九類詮釋其要翼附二疏成本經序疏要皆自為序道光甲辰遽捐館舍癸卯禾錄稿寄湯君用中倡鋟於維揚歸板於其嗣子夢龍長沙方疏證讀醫經筆記皆未卒業因校序以待刻傳
