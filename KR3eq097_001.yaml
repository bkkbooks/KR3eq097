body:
  text: 卷上簡籍者所以稽古哲之謀猷驗時髦之學術歷代祕府皆搜儲至富宋元革命載罹兵燹明成祖廣集遺書編成永樂大典二萬二千九百卷繁重不能刊布嘉靖中僅加繕寫我高宗純皇帝敕繕四庫全書頒貯七閣許士民注册借鈔覆命撰全書提要舉書之大凡人之行履更節為簡明目録宣示臣民俾得周知學術樂育人材亙古未有禾生逢盛世暢讀祕書而在醫言醫不敢縱越謹以史志所載耳目所及之書志其次第曰漢方技三十六家八百六十八卷梁醫方一百三十二部一千二百一卷隋醫方一百五十六部四千五百一十三卷唐明堂經脈三十四家四十部二百四十一卷醫術二百五十七家一百九十二部四千四百五十四卷宋醫書五百八部三千三百一卷金醫書三十六部未載卷一部一百四十三卷元醫書一百三十六部未載卷三十八部七百七十七卷明醫書九十八部未載卷一十九部一千二百六十二卷國朝醫書一百九十六部二千五百一十九卷合共一千三百九十四部一萬九千一百三十六卷令引伏羲氏一部二十卷神農氏八部四十三卷注一家四卷軒轅氏二十九部二百三十七卷注一家一百九卷唐三朝五部三十八卷附梁隋七部二千九百二十八卷宋五朝七部一百六十六卷補二部二百九卷國朝純廟一部九十卷岐伯四部十三卷雷公二部七卷扁鵲俞拊一部二十三卷桐君一部三卷秦越人九部四十七卷注三家八卷附呂博望一部三卷呂廣一部三卷楊元操一部一卷亡名氏十二部三百六十四卷淳于意二部二卷先師張子十三部七十二卷附衛汛三部未載卷二部三卷華他四部八卷吳普二部十六卷李鐺之四部十一卷王叔和七部五十卷附王洙葛洪二部十三卷皇甫謐二部十三卷附範汪一部一百七十卷徐叔向十一部一百六卷徐文伯五部七卷徐嗣伯三部九卷徐之才五部二十一卷陶弘景七部四十五卷姚僧垣二部十五卷巢元方一部五十卷全元起一部八卷甄權三部五卷甄立言二部五十七卷孫思邈八部一百七十七卷蘇敬四部五十七卷孟詵三部十六卷王燾二部五十卷陳藏器一部十卷王冰四部六十七卷大明一部二十卷王惟德一部七卷唐慎微一部三十卷孫兆一部十二卷附高保衡二部五卷韓祗和一部二卷龐安時四部十六卷錢乙二部十三卷朱肱二部二十三卷成無己三部十四卷陳師文裴宗元二部十三卷郭雍一部二十卷許叔微一部十二卷寇宗奭一部二十卷陳言二部二十六卷附嚴用和一部十卷陳自明一部二十四卷張杲一部十卷楊士瀛二部三十三卷劉完素十四部四十一卷附常德一部一卷鎦洪一部一卷張元素四部八卷附子璧二部三卷張從正五部二十二卷李杲八部未載卷一部二十五卷羅天益三部四十四卷王好古六部二十三卷朱震亨十五部三十三卷附羅知悌一部一卷趙以德一部二十二卷王履三部一百二十一卷附徐春甫一部一百卷危亦林一部二十卷呂復十一部皆未載卷滑壽十部十六卷倪維德二部五卷齊德之一部二卷葛乾孫三部二十三卷附父應雷一部十二卷馬宗素一部一卷戴原禮六部未載卷二部二十一卷徐用誠二部五十四卷盛寅一部未載卷陶華四部二十四卷王綸二部皆未載卷虞搏二部十六卷薛己八部十六卷附父鎧一部二十卷李湯卿一部二卷附朱撝一部二卷王肯堂四部三百二十八卷李時珍三部五十四卷孫一奎五部三十八卷張介賓二部九十六卷繆希雍四部四十六卷盧之頤五部無卷二部十五卷附父復四部不著卷吳有性一部三卷劉若金一部三十二卷方有執三部十一卷周子干八部三十卷附胡住思一部一卷查了吾一部一卷李中梓四部二十二卷附尤乘一部二卷張志聰六部三十二卷喻昌三部十三卷附徐彬一部二十四卷沈明宗二部三十四卷張璐五部五十五卷附子登一部一卷倬一部一卷葉桂八部五十三卷戴天章一部四卷徐大椿六部十七卷程林二部未載卷一部二十六卷魏荔彤四部六十二卷程應旄三部二十一卷尤怡五部二十三卷柯琴三部八卷黃元御十一部九十八卷陳士鐸四部四十一卷沈金鰲一部七十二卷陳念祖四部四十六卷附姚球一部四卷鄒澍六部三十九卷計三墳暨列朝敕撰之書七十一部三千八百四十四卷歷代名醫四百一十六部三千八百七十三卷論曰弊根於法法立則弊生法行則弊裕法猶水也弊猶土也水本清土揚之則渾法本平弊撓之則陂持法繩弊適足固弊因弊繕法尚可存法晉唐經方家法也南陽書實法中之法金元諸大家弊也薛己輩尤弊中之弊南陽述而不作故其方旨精嚴學者折矩旋規恆虞差失劉朱作而不述故其論議偷簿學者蒙睛盲視亦洞隱微無如俗好新奇人趨簡易循弊者衆勵法者寡相沿日久遂成結習苟有討究淵源品騭曲直者必群誹膠泥昏狂是醫之劉朱即儒之楊墨劉朱之言不拒南陽之道不彰拒之之法衍其支派臚其載籍與道脈並傳俾治方技者悉讀全書而求其意趣則淄澠自別或可免以冰致蠅以貍致鼠之誚也夫太昊伏羲氏漢書藝文志雜子道二十篇炎帝神農氏漢書藝文志食禁七卷雜子技道二十三卷梁七録本草五卷本草屬物二卷明堂圖一卷隋書經籍志本草八卷本草經三卷唐書藝文志本草三卷宋史藝文志食忌一卷五藏論一卷黃帝軒轅氏漢書藝文志內經十八卷外經三十九卷養陽方二十卷雜子步引十二卷雜子芝菌十八卷雜子十九家方二十一卷梁七録衆難經呂博望注一卷素問八卷甲乙經十二卷針灸經十二卷明堂流注六卷隋書經籍志素問全元起注九卷甲乙經十卷音一卷八十一難經二卷針經九卷流注脈經一卷養胎經一卷素問女胎一卷療婦人産後雜方三卷明堂偃側人圖十二卷針灸蝦蟆忌一卷十二經脈明堂五藏人圖一卷唐書藝文志素問全元起注八卷甲乙經十二卷針經十卷流注脈經一卷十二經脈明堂偃側人圖曹氏注十二卷十二經脈明堂五藏圖一卷針灸經十二卷雜注針經一卷明堂三卷內經明堂十三卷九靈經靈寶注十二卷三部針經皇甫謐集十三卷素問王冰注二十四卷釋文一卷明堂經楊元操注三卷內經明堂類成楊上善注十三卷內經太素楊上善注三十卷宋史藝文志素問全元起注八卷八十一難經宋庭臣注釋一卷針經九卷九靈內經五卷脈經一卷內經素問王冰注二十四卷三部針灸經十二卷靈樞經九卷太素經三卷以上四部林億等校正灸經明堂三卷五藏論一卷問岐伯灸經一卷問答疾狀一卷國朝四庫素問王冰注二十四卷靈樞經十二卷甲乙經八卷上三墳書六十五種除復一十九種凡四十六種漢志七種梁録亡隋志逸本草屬物等五種增八十一難經等九種唐志亡養胎經等四種復出針灸經一種增明堂及九靈經等注家十種宋去甲乙經之復亡針經等十種增靈樞經等八種今時傳本惟王冰注素問二十四卷皇甫謐三部針經十二卷靈樞經十二卷八十一難經二卷凡四種五十卷夫辨藥性者必托神農療疾疢者必依黃帝劉向指內經為諸韓公子所著漢書匡衡傳奏罷本草待詔七十餘人樓護傳少誦醫經本草數十萬言平帝元始五年詔舉天下通知本草者乘傳詣京師則醫經本草漢時已專門傳習雖非一時之言一人之述要皆醫書之祖也唐高宗唐書藝文志本草藥圖二十卷圖經七卷玄宗唐書藝文志開元廣濟方五卷宋史藝文志天寶神驗藥方一卷德宗唐書藝文志貞元集要廣利方五卷宋史藝文志貞元集要廣利方五卷上書五種唐三朝御撰高宗顯慶四年詔英國公李績太尉長孫無忌兼侍中辛茂將太子賓客宏文館學士許敬宗禮部郎中兼太子洗馬宏文館大學士孔志約尚藥奉御許孝崇胡於家蔣季璋尚藥局直長藺復圭許宏直侍御醫巢孝儉太子藥藏監蔣季瑜吳嗣宗丞蔣義方太醫令蔣季琬許宏承蔣茂昌太常丞呂才賈文通太史令李淳風潞王府參軍吳師哲禮部主事顏仁楚右監門府長史蘇敬等參考本經別録分門部類增為一百一十四種廣為二十卷又別撰圖經七卷宋謂之唐本草唐志又有孔志約本草音義二十卷蘇敬新修本草二十卷目一卷本草圖二十六卷本草音三卷本草圖經七卷今皆不傳元宗開元廣濟方尚見於外臺祕要天寶藥方天寶單方藥圖僅於宋志及蘇頌本草圖經序中載其名目德宗貞元廣利方則絶無引用之者隋唐志梁武隋煬皆有醫書隋志梁武所服雜藥方一卷大略丸方五卷靈素雜方二卷隋煬四海類聚方二千六百卷四海類聚單方三百卷唐志梁武座右方十卷如意方十卷隋煬類聚方卷仍其舊單方僅存一十六卷蓋當時第儲祕府未播民間兵革頻仍遂遭焚燬耳宋太祖宋史藝文志開寶詳定本草二十卷目一卷重定本草二十卷目一卷太宗宋史藝文志太平聖惠方一百卷仁宗宋史藝文志慶曆普救方一卷皇佑簡要濟衆方五卷神宗宋史藝文志太醫西局濟世方八卷徽宗宋史藝文志聖濟經十卷上書七種宋五朝敕撰太祖開寶六年詔尚藥奉御劉翰道士馬志翰林醫官翟煦張素王從蘊吳復圭王光佑陳明遇安自良等詳校諸本草參以陳藏器拾遺刊正別名增益品目馬志為之注解覆命左司員外郎知制誥扈蒙翰林學士盧多遜校定御製序文鏤版於國子監七年又以所釋藥類或有未允仍命劉翰馬志等重加增損復詔翰林學士李昉知制誥王佑扈蒙等詳看凡神農所説別以白字名醫所傳別以墨字仍為二十一卷偽蜀孟昶亦命其翰林學士韓保升與諸醫士取唐本圖經合參更加刪補注釋自為制序凡十卷名蜀本草太宗太平興國中出潛邸時所儲名方親驗者千餘首詔醫局各上家傳方書命王懷德王佑鄭彥陳昭遇等校正編類各篇之首著其疾證淳化初書成御製序引仁宗慶曆八年以福州奏獄醫林士元藥下蠱毒人獲生全詔録其方令國醫類集附益書成頒行皇祐三年又以外無善醫不能救民疾疫令醫官使周應簡聖惠方之要者頒下諸道敕長吏案方拯濟嘉祐二年八月置醫書局於編修院詔光祿卿直祕閣林億太常少卿直集賢院掌禹錫國子博士高保衡殿中丞祕閣校理張洞殿中丞祕閣校勘蘇頌殿中丞孫兆尚書屯田郎中孫奇等校正補王冰注素問二十四卷靈樞經九卷難經二卷甲乙經十二卷脈經十卷太素經三卷傷寒論十卷金匱要略三卷金匱玉函經八卷巢氏諸病源候論五十卷千金要方三十卷千金翼方三十卷外臺祕要方四十卷補注開寶本草三十一卷凡一十四種每一書畢即奏上億等皆為序詔下國子監鏤版頒行神宗元豐中置提舉判局設方脈針瘍三科春間考試醫士第一場問素難脈三經大義五道次場問病源龍樹千金翼方中方脈臨證運氣各二道針瘍二科則去脈經而增三部針灸經為小學大義三道運氣二道三場假令治病法三道中格高等為尚藥局醫師又詔天下高手醫各以得效祕方進下太醫局試驗依方製藥鬻之仍模本傳世徽宗政和間御撰聖濟經十篇凡四十二章以達道正紀孕元立本制字命物名篇祖述內素旁援老氏書成頒於兩學辟雍生吳禔為之解義吳禔陳振孫書録解題作梁武吳斌藝文志有黃維解義十卷令皆亡佚無徵但據呂復群經古方考論之説如此大觀中詔庫部郎中陳師文等校正和劑局方又出御府所藏禁方祕論集海內名醫纂集聖濟總録卷二百方二萬御撰序引汴京破後隨內府圖籍北行南宋未有此本故宋志不載元大德四年集賢學士焦惠校序稱始成於政和重刊於大定今時所傳為國朝乾隆五十三年震澤汪鳴珂校刻其友程勳多方訪覓尚缺一百九十五一百九十九三百三卷前有江蘇學政沈初光祿卿王鳴盛序論同病源方同千金外臺惟改換面目不注出處致篾經方之舊案王應麟玉海高宗紹興十八年閏八月二十三改熟藥所為太平惠民局二十一年十二月十七日以監本藥方頒諸路陳振孫書録解題紹興二十九年詔醫官王繼先重校嘉祐本草刻版於修內司今皆不傳徽宗崇寧間廢提舉判局春試改隸國子監分上舍內舍外舍孝宗乾道中罷局僅存醫學科更不置局淳熙中又稍變其制光宗紹熙二年復置局永樂大典集紹熙程文凡墨義九道脈義六道大義三十七道論方八道假令十八道運氣九道國朝四庫編為九卷稱其學術通貫辨析精微可見宋代留意醫學之盛清高宗敕撰醫宗金鑑九十卷乾隆四年十一月十七日太醫院使錢鬥保右院判王炳御醫吳謙奉上諭爾等衙門該修醫書以正醫學欽此又諭一應纂修事宜著和親王大學士伯鄂爾泰總管五年二月十六日和親王具奏傷寒論金匱要略雜病論有吳謙刪訂未完稿本請將大內所有醫書全行發出以資考核即可擇吉開館不必行取各直省之書乾隆十四年告成僅按訂正傷寒論注十七卷金匱要略八卷刪補名醫方論八卷四診要訣一卷運氣要訣一卷諸科心法要訣五十四卷正骨心法要旨五卷大意以有方有論之書始於仲聖乃醫學之正軌名醫隨證消息其精詣處必方論並存始能測識至脈學簡括無過紫虛運氣幽微不可竟廢而雜證之變無窮正骨之法多祕皆為繪圖制訣俾學者易誦易求務歸實用不若宋代聖濟總録和劑局方之博而寡要偏而失中誠萬世遵行之盛典也岐伯氏漢書藝文志按摩一卷隋書經籍志岐伯經十卷宋史藝文志針經一卷論針灸要訣一卷雷公氏隋書經籍志本草注四卷唐書藝文志集撰本草四卷宋史藝文志養性治身經三卷扁鵲氏俞拊氏漢書藝文志泰始黃帝扁鵲俞拊方二十三卷桐君氏隋書經籍志採藥録三卷唐書藝文志採藥録三卷上書十種除復二種凡八種為上古名醫撰今亡按帝王世紀黃帝使岐伯著醫方以療民疾是岐伯為醫方傳世之祖陶隱居本草經序上古文字未傳識識相因至桐雷始著簡編是桐君雷公為本草傳世之祖秦越人以扁鵲自命虢中庶子為荒誕之辭侮之曰上古俞拊治病不用藥石針尉見病之應因五藏之輸乃割皮解肌抉脈結筋搦髓腦揲荒爪幕湔浣腸胃漱滌五藏練精易形先生之方毋乃類是漢志扁鵲內外經或古扁鵲撰或秦越人撰書亡無考姑列於秦越人之下周秦氏越人漢書藝文志內經九卷外經十二卷隋書經籍志黃帝八十一難經二卷肘後方三卷偃側針灸圖三卷唐書藝文志八十一難經二卷宋史藝文志黃帝八十一難經二卷黃帝難經疏十三卷脈經一卷療黃經三卷針傳一卷上書十一種去復二種凡九種周渤海鄚人秦越人著越人慕古扁鵲之學因號扁鵲受長桑君禁方名聞天下秦太醫令李酉盆愧技不如使人刺殺之其弟子子陽善針子豹善尉唐志始有秦越人八十一難經吳太醫令呂廣注則書自三國前出梁七録之呂博望或即呂廣衆難經八十一難經或即唐志之難經今難經中有經云而素問靈樞所無者殆諸經之文歟宋志有呂博望金滕玉匱針經三卷呂廣金韜玉鑑經三卷陳振孫書録解題有呂廣注楊元操演八十一難經五卷皆失傳無名逸書漢書藝文志白氏內經三十八卷外經三十六卷旁篇二十五卷五藏六府痹十二病方三十卷五藏六府疝十六病方四十卷王藏六府疸十二病方四十卷風寒熱十六病方二十六卷五藏傷中十一病方三十一卷客疾五藏狂癲病方十七卷金瘡瘛瘲方三十卷婦人嬰兒方十九卷湯液經法三十二卷上書十二種不著撰人名氏先師未引殆當時傳習之書也梁七録不載豈漢獻遷都晉懷奔逸亡於兵燹歟思邈千金方以五藏六府分配諸病意取法於此或當時尚有遺書可據特鈔其目俾見經方之舊漢淳于氏意漢書列傳對孝文帝二十九條宋史藝文志決死生祕要一卷上書二種漢臨災淳于意撰意為齊太倉長文帝四年中人坐以刑法少女緹縈上書願沒為官婢以贖父罪帝憫而宥之詔詢醫學因條疏以對曰高後八年師同郡元里公乘陽慶受黃帝扁鵲脈書禁方年三十九次陳治病原委並效驗具載史記決死生祕要系宋人所集今亦失傳其弟子馮信受審病逆順和劑五味湯藥法唐安受五診上下奇咳四時應陰陽法高期受經脈高下奇絡俞氣所居針灸砭石法杜信受上下經脈五診法皆擅名漢世漢先師張子梁七録辨傷寒十卷療傷寒身驗方一卷評病要方一卷黃素藥方二十五卷隋書經籍志藥方十五卷療婦人方二卷唐書藝文志藥方十五卷王叔和集傷寒卒病論十卷王叔和集宋史藝文志脈經一卷五藏榮衛論一卷五藏論一卷傷寒論十卷口齒論一卷金匱要略方三卷王叔和集療黃經一卷上書十五種去復二種凡十三種漢南陽張機字仲景撰師嘗舉孝廉官長沙太守後漢書三國志皆失載傷寒論自序云建安紀年未及十稔宗族死亡者三之二乃勤求古訓博採衆方撰用素問九卷八十一難經陰陽大論胎臚藥録並平脈辨證為傷寒雜病論合一十六卷晉王叔和編次宋開寶中節度使高繼沖編進嘉祐中孫奇等校上傷寒論十卷二十二篇三百九十七法一百一十三方金匱要略三卷二十五篇二百六十二方案梁録傷寒藥方各二種隋志藥方二種唐志傷寒藥方各一種宋志二書之外復有脈經等五種皆亡千金方食治序論引仲景及河東衛泛述扁鵲曰二則他書未載宋李昉太平御覽引仲景方序云衛泛仲景弟子撰小兒顱囟方三卷及四逆三部厥經婦人胎藏經宋志及明永樂大典有師巫顱囟經而無泛書今從函海中摘出僅存一卷為綿州李調元校首脈法次病證凡二十四條驚癇疳痢方二十三首火丹證十五方十四首雜治方十五首魏華氏他梁七録內事五卷隋書經籍志觀形察色並三部脈經一卷枕中灸刺經一卷宋史藝文志藥方一卷上書四種魏沛國譙人華他撰倫又名敷字元化遊藝徐土年且百歲猶有壯容精於方藥治病奇詭而性惡難合恥以醫名武帝苦頭風他針之即止後求歸取方托妻病召之不赴帝怒其詐收獄殺之書皆不傳魏吳氏普梁七録本草六卷隋書經籍志華他方十卷唐書藝文志本草因六卷集華氏藥方十卷上書四種去復二種凡二種魏廣陵吳普撰普華氏弟子準師處療多所全濟受虎鹿熊猿鳥五禽道引之戲年九十餘耳目聰明齒牙完固其書至宋失傳他又有弟子樊阿善針受漆葉青黏散服之年百餘歲世傳中藏經八卷隋唐未録宋志始見且方中所用太平錢山藥一為宋熙陵初年號一為避厚陵偏諱鄧處中究不知為何時人其自序荒誕與本傳不合然書中論脈察聲色形證具有至理王氏脈經徵引極多殆即吳氏所集之書後人附入別方幻改今名耳特識於吳氏之下魏李氏鐺之梁七録藥録六卷本草經一卷藥方一卷唐書藝文志李氏本草三卷上書四種魏李鐺之撰新唐志作華氏弟子不列爵里書皆失傳晉王氏叔和梁七録論病一卷隋書經籍志脈經十卷唐書藝文志脈經十卷仲景藥方十五卷傷寒卒病論十卷宋史藝文志脈經十卷金匱要略方三卷金匱玉函經八卷脈決機要三卷民間行本脈經十卷金匱玉函經八卷上書十一種去復四種凡七種西晉太醫令高平王叔和撰叔和一代名醫去漢未遠故有深知灼見能傳仲景道脈托集古經名論撰脈經九十七篇仲景傷寒金匱之文十載八九當成於三陰三陽篇之先宋熙寧初校正後鏤板於廣西漕司長樂陳孔碩序元泰定間龍興醫學教授謝縉重刻東陽柳道傳序道光癸卯疁城黃鋐刊本跋稱得明萬曆三年晉安袁表本卷末識童文舉復校重梓者又得趙府居敬堂本元泰定四年宗濂書院本與家藏鈔本校刻前有叔和自序及熙寧元年林億等進呈札子附袁氏補注金匱玉函經林億校定二十九篇一百一十五方首證治總例一十六條次痙濕暍二十八條辨脈四十五條三陰三陽三百二十八條厥利嘔噦五十條霍亂十條陰陽易等八條與傷寒次序不合不可發汗等一十七篇三百四十七條與脈經次序不合且文義增損語義不侔恐是宋人偽託傳本為國朝康熙丙申上海陳世杰校刻首列宋英宗治平三年校上疏次自序與何焯陳汝楫序案仁宗朝王洙於館閣蠹簡中得金匱玉函要略三卷上卷傷寒中卷雜病下卷藥方並療婦人林億以論傷寒者為金匱玉函經論雜病療婦人者為金匱要略而論雜病之文出脈經八卷療婦人之法出脈經九卷王洙宋城人舉進士纍官翰林學士泛覽博記無所不通著易傳十卷雜文十餘篇子欽臣賜進士及第纍官集賢院待制知成德軍為文至多藏書萬卷皆手自仇正晉葛氏洪梁七録肘後方二卷隋書經籍志玉函煎方五卷肘後方六卷唐書藝文志肘後救卒方六卷宋史藝文志肘後備急百一方六卷國朝四庫肘後備急方八卷上書六種去復四種凡二種晉句容葛洪撰洪字稚川受業於從祖元之弟子鄭隱元帝為丞相闢為椽以平賊功爵關內侯遷散騎常侍領大著作因年老辭乞為句漏令入羅浮山煉丹年八十一卒肘後方梁僅二卷隋唐宋六卷類皆後人增入金匱藥方十五卷亡晉皇甫氏謐隋書經籍志依諸方撰一卷唐書藝文志黃帝三部針經十二卷宋史藝文志黃帝三部針經十二卷國朝四庫甲乙經八卷上書四種去復一種凡三種晉魏郡皇甫謐撰謐字士安自號元晏先生郡召上計椽舉孝廉景元初晉王為相國闢皆不就泰始受禪著釋勸論以通志武帝敦闢不已謐上疏辭疾稱草莽臣患軀半不仁十九載服寒食散違節隆冬裸袒食冰者七年又表借帝書時人目為書淫因病學醫甘露中撰集黃帝岐伯針經素問明堂孔穴針灸治要使事類相從刪浮去復成一十二卷自為序梁録作十二卷隋志作甲乙經十卷音一卷舊唐志作黃帝三部針經十三卷皇甫謐著新唐志既有甲乙經十二卷又有三部針經十三卷當是復誤書凡一百二十八篇句中夾注多引楊氏太素孫氏千金王冰素問注王維德銅人圖皆宋林億等校正所加今時所傳系明新安吳勉學校刻晉書謐幼名靜安定朝那人漢太尉嵩之曾孫出後叔父徙居新安年二十遊蕩不好學叔母任氏流涕婉教乃感激就鄉人席坦受書居貧恆力穡勤學遂博綜典籍有高尚之志以著述為務太康三年卒年六十八遺命服幅巾故衣以蘧篨裹尸麻約二頭置尸床上擇不毛之地穿阮深十尺長一丈五尺舉床就阮去床下尸平生之物皆無所隨惟齋孝經一卷蘧篨之外便以親土土與地平還其故草使生其上不種樹木形骸與后土同體魂爽與元氣合靈亡有前後不得移祔無張神座無十五日朝夕上食禮不墓祭但月朔於家設席以祭百日而止臨必昏明不得以夜撰帝王世紀年曆高士逸士列女等傳元晏春秋及詩賦諫頌論難等門人摯虞張軌牛綜席純皆為晉名臣子童靈方回方回少遵父操永嘉初屢徵博士不起避亂荊州間戶間居尊賢愛物人咸崇敬之刺史陶侃每著素士服望門輒下禮敬甚厚王敦遣從弟廙代侃遷侃廣州方回諫阻不從敦果欲殺侃賴周訪獲免廙至荊州大失物情以方回為侃所敬乃收斬樹威荊土華夷莫不流涕晉名臣見於外臺祕要者有範汪張湛湛無傳汪字元平雍州刺史晷之孫少孤貧六歲過江依外家新野庾氏荊州刺史王澄見而奇之年十三喪母家貧好學蘇峻之亂汪西遁詣庾亮溫嶠陳討賊狀始解褐