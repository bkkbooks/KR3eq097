body:
  text: 跋陶靖節先生讀書不求甚解非不求解也特其天資敏捷不藉窮研冥索自能融會貫通耳畸庵業師初習金元劉張李朱立齊損庵東壁之學久悟其非乃轉求醫經經方傷寒本草著瘍醫雅言及豆疹索隱又悉取所儲醫書史傳研求大旨考核行履為讀書志九十九篇一秉虛衷不淆群議絶去固執穿鑿之弊非敏捷者不能願與真求解者共讀而共解之庶得偕升古人之堂偕入古人之室然求而得其解者必以為古人之諍臣不得其解者必以為古人之罪臣是則攸系民生之幸與不幸而夫子壽人之心終歸不朽矣咸豐元年上巳日門人陽湖劉汝航謹跋
