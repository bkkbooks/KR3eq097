子晦明軒本前有宋政和六年提舉醫學曹孝忠序稱欽奉玉音使臣楊戩總工刊寫末有金皇統三年翰林學士宇文虛中跋大德本作三十一卷朱墨分明泰和本以卷末移入三十卷之前雖刊刻清整而朱墨不楚一為明萬曆丁丑翻刻大德本一為國朝順治丁酉春谷王秋重刻本前有自序後有其子大獻序其書一卷至二卷為序例三卷至五卷為玉石三品二百五十三種六卷至十一卷為草部三品四百四十七種十二卷至十四卷為木部三品二百六十三種十五卷人部二十六種十六卷至十八卷為獸部三品五十八種十九卷為禽部三品五十六種二十卷至二十二卷為蟲魚部三品一百八十七種二十三卷為果部三品五十三種二十四卷至二十六卷為米穀部三品四十八種二十七卷至二十九卷為菜部三品六十五種三十卷為有名未用一百九十四種末卷為本經外草木藤類九十八種總一千七百四十八種所引吳氏本草藥對藥總訣藥性論唐本草食療拾遺四聲刪繁性事類南海藥譜食性日華子及開寶劉翰馬志等詳定本草李昉王祐扈蒙等重定本草寇宗奭衍義凡一十七家汪洋浩瀚誠千古之大觀然諸家之旨賴此以傳諸家之書緣茲遂廢矣宋孫氏兆明史藝文志素問注釋考誤十二卷上書一種宋殿中丞孫兆撰兆父用和昭陵時官尚藥奉御太醫令宋志有孫氏傳家祕寶方五卷自言為思邈之後父子皆以醫名兆弟宰為河東漕屬呂惠卿為並帥從宰得其書序而刻之與兆同校書之國子博士高保衡字若納宋史藝文志有素問誤文闕義一卷傷寒類要四卷與孫氏之書世皆不傳宋韓氏祗和國朝四庫傷寒微旨二卷上書一種宋韓祗和撰祗和史志不載宋陳振孫據序題元祐丙寅定為哲宗時人明永樂大典始標其名而亡其序國朝四庫從大典中録出一十五篇釐為二卷稱其能變通仲聖之旨以汗下溫三法分案時候辰刻參之脈理病情可汗篇分陰盛陽虛陰虛陽盛陰陽俱盛三門又以陽黃歸之汗溫太過陰黃歸之過下亡津皆研析精微切中窾要惟以早下為大戒並不聲明脈症未免矯率禾於沈氏傷寒綱目中讀其所引七條未窺全豹宋龐氏安時宋史藝文志難經解義一卷驗方一卷宋朝氏讀書志家藏祕寶方五卷國朝四庫傷寒總病論六卷音訓一卷修治藥法二卷上書四種宋蘄水處士龐安時撰安時字安常余書亡佚惟傷寒總病論三種自明王宇泰用活字版印後至國朝道光癸未吳門黃丕烈始得宋本影刻首有蘇軾帖黃廷堅後序張來跋蘇黃名皆空白蓋當政和禁絶蘇黃文字時也安常豪富輕財慈愛名傾淮南中年屏絶戲弄刻意學術故其持論精卓足為仲聖羽翼宋錢氏乙宋史藝文志小兒藥證直訣八卷上書一種宋鄆錢乙撰乙字仲陽吳越王宗屬曾祖贇隨王納土因家於鄆父皓善針匿姓名東遊海上乙三歲母亡姑嫁醫工呂哀其孤撫為子以授其業姑病革始告之故乙泣請迹父五六往始得遇又數年乃迎歸乙年三十以顱囟方著名山左元豐中治長公主疾有功授翰林醫學賜緋又愈皇子儀國公病擢太醫丞賜紫衣金魚俄以病免哲宗復召入禁中宿值久之辭疾豫告左手足攣痹者十數年年八十二卒其傷寒論指微五卷宋潛溪稱其深造仲景閫奧並嬰孺論百篇當時即已散佚今之直訣系宋閻孝忠所集明薛己竄改殊為紕繆全失錢書之真宋朱氏肱宋史藝文志內外二景圖三卷南陽活人書二十卷上書二種宋吳興朱肱撰肱祕書丞臨之子中書舍人服之弟登第仕至朝奉郎直祕閣是書因傷寒辭旨雅奧淺學費解遂設為問答綴緝成篇計九萬一千三百六十八字自己巳至戍子歷二十寒暑而成本名無求子傷寒百問方武夷張蕆作序易此名以仲景南陽人而活人者傳本系明金壇王宇泰醫統正脈中摘出內外二景圖亡宋成氏無己宋史藝文志傷寒論注十卷明理論三卷論方一卷國朝四庫同上書三種金聊攝成無己撰無己宋嘉祐時人後聊攝入金遂為金人正隆丙子年九十餘尚存先師傷寒論自晉王叔和編輯宋高繼沖重編林億等校定無己研究終身深有所得故其注釋簡謹又著明理論五十篇論方二十篇闡明辨證用方之義紹興甲子洛陽嚴器之撰序推挹極至開禧元年歷陽張孝忠跋云紹興庚戍得傷寒論注十卷於醫士王光庭家後守荊門又於襄陽訪得明理論因合刊於郴山今郴山本尚有藏者明新安吳勉學校本首有嚴序宋志有嚴器之明理論四卷或是此書之注郭長揚自序有常器之補治論極為推重或是一人存疑俟考宋陳氏師文裴氏宗元宋史藝文志太平惠民和劑局方五卷明朝刻本惠民和劑局方十卷用藥指南總論三卷國朝四庫惠民和劑局方十卷用藥指南總論三卷上書五種去復三種凡二種宋大觀中庫部郎中陳師文太醫令裴宗元將仕郎陳承奉詔撰凡十卷十四門七百八十八方與朱震亨二百九十七方之説不合今本為明崇禎丁丑羅青山人朱葵冶城袁元熙校刻首冠炮灸凡例三臣會銜撰進表亡用藥指南其書有方無論方似千金外臺經方藥每同而名迥異蓋遵聖濟體制先聖濟而出耳局方發揮惟闢其用溫補燥熱而牛黃丸混入薯蕷丸全方竟未察出何哉宋郭氏雍國朝徐氏刻本傷寒補亡論二十卷上書一種宋河南郭雍撰雍字白雲朱文公熹稱為長陽沖晦先生淳熙八年自序言仲兄之言通守夷陵秭歸二郡以多疾訪醫見常器之康醇道因究仲景之學雍受兄教漸磨日久行年八十略舉岐黃及近代諸書大綱集成論説二十卷方藥五卷合一千五百餘條分七十餘門總五萬言慶元五年熹為之作序明萬曆五年誠意伯劉世延序而重刻亡第十六卷及方藥五卷僅十九卷六十四門一千四百餘條今時傳本為國朝道光元年長洲徐錦校刻宋許氏叔微宋史藝文志普濟本事方十二卷國朝四庫普濟本事方十卷上書一種宋真州許叔微撰叔微字知可或曰揚州人或曰毗陵人惟曾敏行與叔微同時其獨醒雜志謂為真州人當不誤紹興二年進士官爵未詳曰學士者乃宋詞臣之通稱書旨簡雅多載醫案驗方故曰本事明朱國禎湧幢小品記叔微所著翼傷寒論二卷辨論五卷傷寒歌三卷凡百篇治法八十一篇仲景脈法三十六圖未有傳本宋寇氏宗奭朝氏讀書志本草衍義二十卷上書一種宋通直郎澧州司戶曹事添差充收買藥材所辦驗藥材寇宗奭撰籍里無考自序衍未盡之理伸隱避之情證脫誤之義煩避諱之名考據頗屬精詳其書為金平陽張存惠增入嘉祐補注外無傳本宋陳氏言宋史藝文志三因病源六卷國朝四庫三因極一病證方論十八卷上書二種宋括蒼陳言撰言字無擇行履無考其書命名本於金匱其方論典雅簡該絶無冗鄙之弊嚴用和剽竅其論附以已所驗方吳澄易簡歸一序極稱其美三因方傳本為明何巨校刻分為一十八卷二卷中太醫習業有二十一史之文非南宋人語蓋明代鈔寫傭人妄改濟生方收存四庫外無行本惟目録中載其自序云論治五十方凡四百總為十卷宋陳氏自明國朝四庫婦人大全良方二十四卷上書一種宋臨川陳自明撰自明字良父官建府醫學教諭是書刻於嘉熙元年自序稱三世學醫藏書甚夥而行履所至必加詢訪凡八門二百餘論論後附方首調經次衆疾求嗣胎教坐月産難産後序列秩然既詳且富薛氏所集則刪訂增附別成一書非勤有書堂原本矣宋張氏杲國朝四庫醫説十卷上書一種宋新安張杲撰杲字季明伯祖擴受龐安時業著名京洛杲承其家學撰為是編前七門總序古來名醫醫書及針灸診視之類次雜證二十八門雜論六門婦人小兒二門瘡及五絶痹疝三門終以醫功報應凡四十七門皆系古今治驗而禁方祕論往往間出惟雜採説部頗病神怪且既戒天靈蓋不可用又出拾遺人肉一條自相矛盾不可為訓然實有淵源非泛常炫説者可比宋楊氏士瀛國朝四庫仁齋直指二十六卷傷寒類書活人總括七卷上書二種宋福州楊士瀛撰士瀛字登甫號仁齋序題景定甲子乃宋末人是書為明嘉靖中徽州朱崇正字仲儒號惠齋者校刻其傷寒類書自序成於直指之前因卷帙較少附遺於後提要辨述原委甚悉禾從沈金鰲尊生悉其大凡實為支離穿鑿惟外無行本不能窮其底蘊
